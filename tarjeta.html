<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Tenis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
        rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #212529;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }

        .card img {
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <header class="border-bottom py-3 mb-4 page-container">
        <div class="d-flex justify-content-between align-items-center">
            <h3 class="mb-0 fw-bold">Jordan</h3>
        </div>
    </header>

    <div class="page-container pt-0">
        <div class="row">
            <div class="col-12">
                <div id="contenedor-tarjetas" class="row g-4">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const jsonUrl = 'tarjeta.json';

        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) throw new Error('No se pudo leer el archivo JSON');
                return response.json();
            })
            .then(productos => {
                const contenedor = document.getElementById('contenedor-tarjetas');


                if (!Array.isArray(productos)) {
                    throw new Error("El JSON debe ser una lista/array de productos. Revisa la estructura del archivo JSON.");
                }


                const tarjetasHTML = productos.map(producto => `
                <div class="col-12 col-sm-6 col-md-4 col-lg-4">
                    <div class="card h-100 shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
                        <div class="bg-light p-3 d-flex justify-content-center align-items-center" style="height: 250px;">
                            <img src="${producto.imagen}" class="card-img-top" alt="${producto.titulo}" style="object-fit: contain; max-height: 100%; width: auto;">
                        </div>
                        <div class="card-body d-flex flex-column">
                            ${producto.etiqueta_destacada ? `<span class="badge bg-danger mb-2 align-self-start">${producto.etiqueta_destacada}</span>` : ''}
                            <h5 class="card-title fw-bold fs-5 mb-1">${producto.titulo}</h5>
                            <p class="card-text text-muted mb-3">${producto.categoria}</p>
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="fw-bold fs-4">$${producto.precio}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

                contenedor.innerHTML = tarjetasHTML;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('contenedor-tarjetas').innerHTML = `
                <div class="col-12 text-center text-danger py-5">
                    <h5>Error al cargar los productos</h5>
                    <p>${error.message}</p>
                </div>
            `;
            });
    </script>

</body>

</html>
